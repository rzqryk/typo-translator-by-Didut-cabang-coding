function translateText(){

let input = document.getElementById("text").value.toLowerCase().trim()

document.getElementById("text").addEventListener("input", function(){
if(input === ""){
document.getElementById("artiBox").innerText = ""
document.getElementById("info").innerText = ""
}
});

if(input === ""){
document.getElementById("artiBox").innerText = ""
document.getElementById("info").innerText = ""
return
}

if(typoKamus[input]){
document.getElementById("artiBox").innerText =
typoKamus[input].arti

document.getElementById("info").innerText =
"keterangan: " + typoKamus[input].keterangan

}
else{

document.getElementById("artiBox").innerText = "sorry coy, itu ga ada di kamus kita."
document.getElementById("info").innerText = ""

}

}

document.getElementById("text").addEventListener("keypress", function(event) {
if (event.key === "Enter") {
let btn = document.getElementById("translateBtn")
btn.style.background = "#ff0000"

setTimeout(function(){
btn.style.background = "" 
},120)

translateText();

}
});
